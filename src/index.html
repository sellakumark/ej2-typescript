<!DOCTYPE html>
<html lang="en">

<head>
    <title>EJ2 TypeScript Scheduler</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Essential JS 2" />
    <meta name="author" content="Syncfusion" />
    <link rel="shortcut icon" href="icon/favicon.ico" />
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.syncfusion.com/ej2/material.css" />
    <link rel="stylesheet" href="./index.css" />
    <style>
        body {
            padding: 15px 0;
            touch-action: none;
        }

        .e-schedule .template-wrap {
            display: flex;
            text-align: left;
        }

        .e-schedule .e-agenda-view .template-wrap {
            display: table;
            width: inherit;
            text-align: center;
            padding-top: 10px;
        }

        .e-schedule:not(.e-device) .e-agenda-view .e-content-wrap table td:first-child {
            width: 110px;
        }

        .e-schedule .template-wrap .airline-image {
            width: 30px;
            margin-top: 15px;
            background-repeat: no-repeat;
        }

        .e-schedule.e-device .template-wrap .airline-image {
            margin-top: 5px;
        }

        .e-schedule .e-agenda-view .template-wrap .airline-image {
            height: 30px;
            margin-top: 0;
            margin-left: 35%;
        }

        .e-schedule .e-vertical-view .e-resource-cells {
            height: 76px;
        }

        .e-bigger .e-schedule .e-vertical-view .e-resource-cells {
            height: 80px;
        }

        .e-schedule .template-wrap .airline-details {
            padding-left: 15px;
        }

        .e-schedule .e-agenda-view .template-wrap .airline-details {
            padding: 0;
        }

        .e-schedule .template-wrap .airline-details .airline-name {
            font-size: 16px;
            font-weight: 500;
        }

        .e-schedule.e-device .template-wrap .airline-details .airline-name {
            font-size: inherit;
            font-weight: inherit;
        }

        .e-schedule .template-wrap .airline-image.airways-1 {
            background-image: url('//ej2.syncfusion.com/demos/src/schedule/images/airways-1.svg');
        }

        .e-schedule .template-wrap .airline-image.airways-2 {
            background-image: url('//ej2.syncfusion.com/demos/src/schedule/images/airways-2.svg');
        }

        .e-schedule .template-wrap .airline-image.airways-3 {
            background-image: url('//ej2.syncfusion.com/demos/src/schedule/images/airways-3.svg');
        }

        .e-schedule .e-agenda-view .template-wrap .airline-model,
        .e-schedule .e-agenda-view .template-wrap .airline-seats {
            display: none;
        }

        .e-schedule.e-device .template-wrap .airline-model,
        .e-schedule.e-device .template-wrap .airline-seats {
            display: none;
        }
    </style>

    <script id="restemplate" type="text/x-template">
		<div class='template-wrap'>
			<div class="airline-image ${getAirlineImage(data)}"></div>
			<div class="airline-details">
				<div class="airline-name">${getAirlineName(data)}</div>
				<div class="airline-model">Model no: ${getAirlineModel(data)}</div>
				<div class="airline-seats">No.of seats: ${getAirlineSeats(data)}</div>
			</div>
		</div>
	</script>
</head>

<body>
    <div class="control-section">
        <div id="Schedule"></div>
    </div>

    <script src="index.js" type="text/javascript"></script>
</body>

</html>
